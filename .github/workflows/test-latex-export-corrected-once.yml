name: Test corrected LaTeX export once

on:
  push:
    branches:
      - feature/latex-output
    paths:
      - .github/workflows/test-latex-export-corrected-once.yml

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/latex-output
          fetch-depth: 0
      - run: python3 tools/smoke_test.py
      - run: node tools/test_latex_export.js
      - name: Check application script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>([\s\S]*?)</script>', html, flags=re.IGNORECASE)
          Path('/tmp/app.js').write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/app.js
      - name: Record successful tests
        run: |
          echo "LaTeX export tests passed." > tools/latex_test_passed.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/latex_test_passed.txt
          git commit -m "Record successful LaTeX export tests"
          git push origin feature/latex-output
