name: Diagnose Normal block style

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/fix-normal-block-style.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/revised-ribbon-ui
          fetch-depth: 0

      - name: Capture relevant ribbon source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          terms = [
              'function applyVisualBlock',
              "if (state.activeTab === 'view')",
              "event.target.id === 'sciwrixBlockStyle'",
              'function initialise()',
          ]
          output = []
          for term in terms:
              index = text.find(term)
              output.append(f'=== {term} at {index} ===')
              if index >= 0:
                  output.append(text[max(0, index - 250):index + 1600])
              output.append('')

          pattern = re.compile(r"  function applyVisualBlock\(kind\) \{.*?\n  \}\n\n  function applyBlockStyle", re.DOTALL)
          output.append(f'applyVisualBlock regex matches: {len(pattern.findall(text))}')
          output.append(f'initialise marker count: {text.count("  }\\n\\n  if (document.readyState === \'loading\') {")}')
          output.append(f'forced reset count: {text.count("event.target.value = \'normal\';")}')
          Path('normal-debug.txt').write_text('\n'.join(output), encoding='utf-8')
          PY

      - name: Commit diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add normal-debug.txt
          git commit -m 'Add temporary Normal-style diagnostic'
          git push origin HEAD:feature/revised-ribbon-ui
