name: Add SoftwareApplication structured data

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/add-software-structured-data.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add SoftwareApplication structured data
        run: python3 tools/add_software_structured_data.py

      - name: Run smoke checks
        run: python3 tools/smoke_test.py

      - name: Commit homepage update
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- home/index.html; then
            echo "No homepage changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add home/index.html
          git commit -m "Add SoftwareApplication structured data"
          git push origin HEAD:main
