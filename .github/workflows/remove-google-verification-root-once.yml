name: Remove Google verification from root

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/remove-google-verification-root-once.yml

permissions:
  contents: write

jobs:
  remove-root-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove verification tag from root app
        run: python3 tools/remove_google_verification_from_root.py

      - name: Validate root and homepage
        run: |
          python3 - <<'PY'
          from pathlib import Path
          tag = '<meta name="google-site-verification" content="8T_Lhlq8hZqCxSO8JbrTHXz-VCUu44IGhsJOVtdTp9o">'
          root = Path('index.html').read_text(encoding='utf-8')
          home = Path('home/index.html').read_text(encoding='utf-8')
          if tag in root:
              raise SystemExit('Verification tag still exists in root app')
          if home.count(tag) != 1:
              raise SystemExit('Homepage must contain exactly one verification tag')
          print('Verification tag is restricted to /home/.')
          PY

      - name: Commit cleanup
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Keep Google verification on homepage only"
          git push origin main
