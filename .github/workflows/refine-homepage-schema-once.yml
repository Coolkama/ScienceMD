name: Refine homepage schema once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/refine-homepage-schema-once.yml

permissions:
  contents: write

jobs:
  refine-homepage-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply structured data refinement
        run: python3 tools/refine_homepage_schema.py

      - name: Validate JSON-LD
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path
          html = Path('home/index.html').read_text(encoding='utf-8')
          match = re.search(r'<script type="application/ld\+json">\s*(.*?)\s*</script>', html, re.S)
          if not match:
              raise SystemExit('JSON-LD block not found')
          data = json.loads(match.group(1))
          types = {item.get('@type') for item in data.get('@graph', [])}
          if 'SoftwareApplication' in types:
              raise SystemExit('Ineligible SoftwareApplication markup remains')
          if not {'WebSite', 'WebPage', 'ImageObject'}.issubset(types):
              raise SystemExit(f'Expected structured data types missing: {types}')
          print('Structured data is valid and avoids unsupported review claims.')
          PY

      - name: Remove one-time maintenance files
        run: |
          rm tools/refine_homepage_schema.py
          rm .github/workflows/refine-homepage-schema-once.yml

      - name: Commit refinement
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refine homepage structured data"
          git push origin main
