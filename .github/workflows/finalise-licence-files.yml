name: Finalise licence files
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/finalise-licence-files.yml
permissions:
  contents: write
jobs:
  finalise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write complete MIT licence
        run: |
          printf '%s' '' | base64 --decode > WICKED_GOOD_XPATH_LICENSE.txt
      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add WICKED_GOOD_XPATH_LICENSE.txt
          git commit -m 'Include full Wicked Good XPath MIT licence' || exit 0
          git push
