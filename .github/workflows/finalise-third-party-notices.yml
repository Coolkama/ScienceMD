name: Finalise third-party notices
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/finalise-third-party-notices.yml
permissions:
  contents: write
jobs:
  finalise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write complete notices
        run: |
          printf '%s' '' | base64 --decode > THIRD_PARTY_NOTICES.md
      - name: Commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add THIRD_PARTY_NOTICES.md
          git commit -m 'Expand third-party software notices' || exit 0
          git push
