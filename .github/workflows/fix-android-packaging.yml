name: Fix Android packaging

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/fix-android-packaging.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore generated Android assets and resources
        run: |
          printf '%s' '' | base64 --decode > android/app/build.gradle

          python3 - <<'PY'
          from pathlib import Path
          p = Path('.github/workflows/release-android-apk.yml')
          s = p.read_text(encoding='utf-8')
          s = s.replace("for example 1.3.3", "for example 1.3.4")
          s = s.replace("default: '1.3.3'", "default: '1.3.4'")
          s = s.replace("default: '9'", "default: '10'")
          s = s.replace("version_name must look like 1.3.3", "version_name must look like 1.3.4")
          p.write_text(s, encoding='utf-8')
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Android packaging
        run: |
          python3 tools/smoke_test.py
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon :app:lintDebug :app:assembleDebug
          test -s app/build/outputs/apk/debug/app-debug.apk
          test -s app/build/generated/sciencemdAssets/index.html
          test -s app/build/generated/sciencemdResources/drawable/sciencemd_launcher_icon.png

      - name: Commit packaging repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle .github/workflows/release-android-apk.yml
          git commit -m "Fix Android packaging for ScienceMD 1.3.4" || exit 0
          git push
