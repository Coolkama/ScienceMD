name: Finalise Sciwrix 1.6.1

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalise:
    if: github.head_ref == 'release/sciwrix-1.6.1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update smoke-test version defaults
        run: |
          python3 - <<'PY'
          from pathlib import Path
          smoke = Path('tools/smoke_test.py')
          text = smoke.read_text(encoding='utf-8')
          text = text.replace("require(\"?: '15'\" in gradle and \"?: '1.6.0'\" in gradle, \"Android 1.6.0 version defaults are missing\")", "require(\"?: '16'\" in gradle and \"?: '1.6.1'\" in gradle, \"Android 1.6.1 version defaults are missing\")")
          smoke.write_text(text, encoding='utf-8')
          PY
          python3 tools/smoke_test.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/smoke_test.py
          git commit -m 'Update smoke checks for Sciwrix 1.6.1'
          git push origin main
