name: Apply Android app icon

on:
  push:
    branches:
      - main
    paths:
      - '.github/triggers/apply-android-icon'

permissions:
  contents: write

jobs:
  apply-icon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode approved ScienceMD icon
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android/app/src/main/res/drawable
          base64 --decode tools/sciencemd_icon_512.png.b64 > android/app/src/main/res/drawable/sciencemd_icon.png
          file android/app/src/main/res/drawable/sciencemd_icon.png | grep -q 'PNG image data'
          rm -f android/app/src/main/res/drawable/sciencemd_icon.xml

      - name: Remove temporary icon installer files
        run: |
          rm -f tools/sciencemd_icon_512.png.b64
          rm -f .github/triggers/apply-android-icon
          rm -f .github/workflows/apply-android-icon.yml

      - name: Commit Android icon
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update Android app icon"
          git push
